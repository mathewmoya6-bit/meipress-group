<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0b1a2e 0%, #1a3a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo .icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, #00b4d8, #0077b6);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        .logo h1 { font-size: 1.8rem; font-weight: 800; color: #0b1a2e; }
        .logo h1 span { color: #00b4d8; }
        .logo p { color: #5a6f87; font-size: 0.95rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: #1f2a3f;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: 0.2s;
        }
        .form-group .input-wrapper input:focus {
            outline: none;
            border-color: #00b4d8;
            box-shadow: 0 0 0 4px rgba(0,180,216,0.1);
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #5a6f87;
            cursor: pointer;
        }
        .form-options a {
            color: #00b4d8;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
        }
        .form-options a:hover { text-decoration: underline; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(145deg, #00b4d8, #0077b6);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,180,216,0.3);
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            display: none;
            margin-bottom: 16px;
            border-left: 4px solid #ef4444;
        }
        .error.show { display: flex; align-items: center; gap: 10px; }
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .footer a { color: #00b4d8; text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .logo h1 { font-size: 1.4rem; }
            .form-options { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="icon">MEI</div>
                <h1>MEI <span>Admin</span></h1>
                <p>Secure access to management dashboard</p>
            </div>

            <div class="error" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="admin@mei.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="remember" checked>
                        Remember me
                    </label>
                    <a href="#" onclick="alert('Contact system administrator')">Forgot password?</a>
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                </button>
            </form>

            <div class="footer">
                &copy; 2025 <a href="/">MEI Press Group Ltd.</a>
                <br>
                <span style="font-size:0.7rem;opacity:0.6;">v2.0.0</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const btn = document.getElementById('loginBtn');

            error.classList.remove('show');

            if (!email || !password) {
                errorText.textContent = 'Please fill in all fields';
                error.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                // Check credentials (simple demo)
                const admins = JSON.parse(localStorage.getItem('mei_admins') || '[]');
                const user = admins.find(a => a.email === email && btoa(password) === a.password);

                if (user) {
                    // Success
                    const session = {
                        email: user.email,
                        name: user.name || 'Admin',
                        role: user.role || 'admin',
                        loginTime: new Date().toISOString()
                    };
                    localStorage.setItem('mei_admin_session', JSON.stringify(session));
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Failed - check if default admin exists
                    const defaultAdmins = [
                        { email: 'admin@mei.com', password: btoa('admin123') }
                    ];
                    const defaultUser = defaultAdmins.find(a => a.email === email && a.password === btoa(password));
                    
                    if (defaultUser) {
                        // Create the admin in localStorage
                        const newAdmin = {
                            id: Date.now(),
                            name: 'Administrator',
                            email: email,
                            password: btoa(password),
                            role: 'admin',
                            created: new Date().toISOString(),
                            status: 'active'
                        };
                        const allAdmins = JSON.parse(localStorage.getItem('mei_admins') || '[]');
                        allAdmins.push(newAdmin);
                        localStorage.setItem('mei_admins', JSON.stringify(allAdmins));
                        
                        const session = {
                            email: newAdmin.email,
                            name: newAdmin.name,
                            role: newAdmin.role,
                            loginTime: new Date().toISOString()
                        };
                        localStorage.setItem('mei_admin_session', JSON.stringify(session));
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        errorText.textContent = 'Invalid email or password';
                        error.classList.add('show');
                        btn.classList.remove('loading');
                        btn.disabled = false;
                    }
                }
            }, 1000);
        });

        // Check if already logged in
        const session = localStorage.getItem('mei_admin_session');
        if (session) {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
