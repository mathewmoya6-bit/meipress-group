<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI Group</title>
    <meta name="theme-color" content="#0b1a2e">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --primary: #00b4d8;
            --primary-dark: #0090b0;
            --primary-light: #66d9ff;
            --secondary: #0b1a2e;
            --bg: #f0f4f8;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #5a6f87;
            --border: #e2e8f0;
            --shadow: 0 8px 40px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 60px rgba(0,0,0,0.12);
            --radius: 20px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(0,180,216,0.06) 0%, transparent 70%);
            pointer-events: none;
            animation: floatBg 20s ease-in-out infinite alternate;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            left: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 70%, rgba(11,26,46,0.04) 0%, transparent 70%);
            pointer-events: none;
            animation: floatBg 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatBg {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -30px) scale(1.1); }
        }

        /* ===== LOGIN CONTAINER ===== */
        .login-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== LOGIN CARD ===== */
        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 48px 40px 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--primary));
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: -200% 0; }
            50% { background-position: 200% 0; }
        }
        .login-card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* ===== LOGO ===== */
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.8rem;
            box-shadow: 0 8px 24px rgba(0,180,216,0.25);
            transition: transform 0.3s ease;
            margin-bottom: 16px;
        }
        .login-logo .logo-icon:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        .login-logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .login-logo h1 span {
            color: var(--primary);
        }
        .login-logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        /* ===== FORM ===== */
        .login-form {
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text);
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            transition: 0.2s;
            pointer-events: none;
        }
        .form-group .input-wrapper input {
            width: 100%;
            padding: 13px 16px 13px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text);
            background: var(--bg);
            transition: all 0.25s ease;
        }
        .form-group .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0,180,216,0.1);
            background: white;
        }
        .form-group .input-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .form-group .input-wrapper input:focus + i,
        .form-group .input-wrapper input:focus ~ i {
            color: var(--primary);
        }
        .form-group .input-wrapper .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: 0.2s;
        }
        .form-group .input-wrapper .toggle-password:hover {
            color: var(--text);
        }

        /* ===== OPTIONS ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .form-options .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .form-options .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .form-options .forgot-link {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.2s;
        }
        .form-options .forgot-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ===== BUTTONS ===== */
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(145deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,180,216,0.35);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-login .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .btn-login.loading .spinner {
            display: inline-block;
        }
        .btn-login.loading .btn-text {
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ERROR MESSAGE ===== */
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            display: none;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 0.9rem;
            border-left: 4px solid #dc2626;
            animation: shake 0.4s ease;
        }
        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .error-message i {
            font-size: 1.1rem;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ===== FOOTER ===== */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .login-footer p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .login-footer .version {
            display: inline-block;
            background: var(--bg);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }
        .login-footer .brand-link {
            color: var(--primary);
            font-weight: 600;
            transition: 0.2s;
        }
        .login-footer .brand-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* ===== SECURITY BADGES ===== */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .security-badges .badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            background: var(--bg);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .security-badges .badge i {
            font-size: 0.8rem;
            color: var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 28px;
                border-radius: 16px;
            }
            .login-logo .logo-icon {
                width: 60px;
                height: 60px;
                font-size: 1.4rem;
            }
            .login-logo h1 {
                font-size: 1.4rem;
            }
            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .login-footer {
                margin-top: 16px;
                padding-top: 16px;
            }
            .security-badges {
                gap: 8px;
            }
            .security-badges .badge {
                font-size: 0.6rem;
                padding: 2px 10px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 24px 16px 20px;
            }
            .form-group .input-wrapper input {
                padding: 11px 12px 11px 38px;
                font-size: 0.9rem;
            }
            .btn-login {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        /* ===== ACCESSIBILITY ===== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">MEI</div>
                <h1>MEI <span>Admin</span></h1>
                <p>Secure access to management dashboard</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input
                            type="email"
                            id="email"
                            placeholder="admin@mei.com"
                            required
                            autocomplete="username"
                            aria-describedby="emailError"
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                            aria-describedby="passwordError"
                        />
                        <button
                            type="button"
                            class="toggle-password"
                            id="togglePassword"
                            aria-label="Toggle password visibility"
                            tabindex="-1"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked />
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </span>
                </button>
            </form>

            <!-- Security Badges -->
            <div class="security-badges">
                <span class="badge"><i class="fas fa-lock"></i> 256-bit SSL</span>
                <span class="badge"><i class="fas fa-shield-alt"></i> Secure Login</span>
                <span class="badge"><i class="fas fa-clock"></i> Session Expires</span>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>
                    &copy; 2025 <a href="#" class="brand-link">MEI Press Group Ltd.</a>
                    <br>
                    <span class="version">v2.0.0</span>
                </p>
            </div>

        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
        (function() {
            'use strict';

            // ===== DOM REFS =====
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const togglePassword = document.getElementById('togglePassword');
            const rememberMe = document.getElementById('rememberMe');
            const forgotLink = document.getElementById('forgotLink');

            // ===== CONFIG =====
            // In production, this would be a secure API endpoint
            // For demo, we use localStorage with a hashed password
            const ADMIN_EMAIL = 'admin@mei.com';
            // Default password: admin123
            // In production, this would be a bcrypt hash
            const ADMIN_PASSWORD_HASH = btoa('admin123'); // Simple encoding for demo

            // ===== CHECK REMEMBERED =====
            function checkRemembered() {
                const remembered = localStorage.getItem('mei_admin_remember');
                if (remembered) {
                    try {
                        const data = JSON.parse(remembered);
                        emailInput.value = data.email || '';
                        if (data.remember) {
                            rememberMe.checked = true;
                        }
                    } catch {
                        // Ignore
                    }
                }
                // Focus on email if empty, else password
                if (emailInput.value) {
                    passwordInput.focus();
                } else {
                    emailInput.focus();
                }
            }

            // ===== TOGGLE PASSWORD =====
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
                this.setAttribute('aria-label', type === 'password' ? 'Show password' : 'Hide password');
            });

            // ===== SHOW ERROR =====
            function showError(message) {
                errorText.textContent = message || 'Invalid credentials. Please try again.';
                errorMessage.classList.add('show');
                // Shake the form
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                setTimeout(() => {
                    card.style.animation = 'shake 0.4s ease';
                }, 10);
                setTimeout(() => {
                    card.style.animation = '';
                }, 500);
            }

            function hideError() {
                errorMessage.classList.remove('show');
            }

            // ===== SET LOADING STATE =====
            function setLoading(loading) {
                if (loading) {
                    loginBtn.classList.add('loading');
                    loginBtn.disabled = true;
                    loginBtn.setAttribute('aria-busy', 'true');
                } else {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    loginBtn.removeAttribute('aria-busy');
                }
            }

            // ===== VALIDATE EMAIL =====
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            // ===== HANDLE LOGIN =====
            async function handleLogin(e) {
                e.preventDefault();
                hideError();

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const remember = rememberMe.checked;

                // Validate
                if (!email) {
                    showError('Please enter your email address.');
                    emailInput.focus();
                    return;
                }
                if (!isValidEmail(email)) {
                    showError('Please enter a valid email address.');
                    emailInput.focus();
                    return;
                }
                if (!password) {
                    showError('Please enter your password.');
                    passwordInput.focus();
                    return;
                }
                if (password.length < 6) {
                    showError('Password must be at least 6 characters.');
                    passwordInput.focus();
                    return;
                }

                setLoading(true);

                // Simulate network delay
                await new Promise(resolve => setTimeout(resolve, 800));

                // Check credentials
                const isValid = email === ADMIN_EMAIL && btoa(password) === ADMIN_PASSWORD_HASH;

                if (isValid) {
                    // Success
                    const sessionData = {
                        email: email,
                        name: 'Administrator',
                        loginTime: new Date().toISOString(),
                        role: 'admin'
                    };

                    localStorage.setItem('mei_admin_session', JSON.stringify(sessionData));

                    if (remember) {
                        localStorage.setItem('mei_admin_remember', JSON.stringify({
                            email: email,
                            remember: true
                        }));
                    } else {
                        localStorage.removeItem('mei_admin_remember');
                    }

                    // Show success message
                    const btnText = loginBtn.querySelector('.btn-text');
                    btnText.innerHTML = '<i class="fas fa-check-circle"></i> Success! Redirecting...';

                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 600);

                } else {
                    // Failed
                    setLoading(false);
                    showError('Invalid email or password. Please try again.');
                    passwordInput.value = '';
                    passwordInput.focus();

                    // Increment failed attempts (for demo)
                    let attempts = parseInt(localStorage.getItem('mei_failed_attempts') || '0');
                    attempts++;
                    localStorage.setItem('mei_failed_attempts', attempts.toString());

                    if (attempts >= 5) {
                        showError('Too many failed attempts. Please try again in 5 minutes.');
                        loginBtn.disabled = true;
                        setTimeout(() => {
                            loginBtn.disabled = false;
                            localStorage.setItem('mei_failed_attempts', '0');
                        }, 300000);
                    }
                }
            }

            // ===== FORGOT PASSWORD =====
            forgotLink.addEventListener('click', function(e) {
                e.preventDefault();
                showError('Please contact the system administrator to reset your password.');
                setTimeout(() => {
                    hideError();
                }, 5000);
            });

            // ===== KEYBOARD SHORTCUTS =====
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+L for quick login (dev only)
                if (e.ctrlKey && e.shiftKey && e.key === 'L') {
                    e.preventDefault();
                    emailInput.value = ADMIN_EMAIL;
                    passwordInput.value = 'admin123';
                    form.dispatchEvent(new Event('submit'));
                }
            });

            // ===== ENTER KEY ON PASSWORD =====
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    form.dispatchEvent(new Event('submit'));
                }
            });

            // ===== LIVE VALIDATION =====
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);

            // ===== INIT =====
            checkRemembered();

            // ===== EVENT LISTENER =====
            form.addEventListener('submit', handleLogin);

            // ===== CONSOLE HELP =====
            console.log('🔐 Admin Login v2.0');
            console.log('📧 Email: admin@mei.com');
            console.log('🔑 Password: admin123');
            console.log('💡 Quick login: Ctrl+Shift+L');

            // ===== DEVELOPMENT ONLY: Auto-login with demo credentials =====
            // Uncomment for faster development
            // setTimeout(() => {
            //     emailInput.value = ADMIN_EMAIL;
            //     passwordInput.value = 'admin123';
            //     form.dispatchEvent(new Event('submit'));
            // }, 300);

        })();
    </script>
</body>
</html>
