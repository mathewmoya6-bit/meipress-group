<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Mei Press Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); padding:2rem; }
        .auth-container { background:white; padding:3rem; border-radius:1.5rem; max-width:500px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .auth-container .logo { text-align:center; margin-bottom:2rem; font-size:1.8rem; color:#1a1a2e; }
        .auth-container .logo span { font-size:0.8rem; color:#00b4d8; display:block; }
        .auth-container h2 { text-align:center; }
        .auth-container .subtitle { text-align:center; color:#666; margin-bottom:2rem; }
        .auth-form .form-group { margin-bottom:1.5rem; }
        .auth-form label { display:block; margin-bottom:0.5rem; font-weight:600; }
        .auth-form input { width:100%; padding:0.8rem; border:2px solid #ddd; border-radius:0.5rem; font-family:inherit; font-size:1rem; }
        .auth-form input:focus { outline:none; border-color:#00b4d8; }
        .auth-form .password-wrapper { position:relative; }
        .auth-form .toggle-password { position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#999; }
        .auth-form .terms { display:flex; align-items:flex-start; gap:0.5rem; font-size:0.9rem; color:#666; }
        .auth-form .terms input { width:auto; margin-top:0.2rem; }
        .auth-form .terms a { color:#00b4d8; text-decoration:none; }
        .btn-auth { width:100%; padding:1rem; background:#1a1a2e; color:white; border:none; border-radius:0.5rem; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s; }
        .btn-auth:hover { background:#00b4d8; transform:translateY(-2px); }
        .auth-container .footer-text { text-align:center; margin-top:1.5rem; color:#666; }
        .auth-container .footer-text a { color:#00b4d8; text-decoration:none; font-weight:600; }
        .error-message { color:#e74c3c; font-size:0.85rem; margin-top:0.3rem; display:block; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        @media (max-width:480px) { .auth-container { padding:2rem 1.5rem; } .form-row { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="logo">MEI PRESS GROUP<span>Build Your Future With Us</span></div>
            <h2>Create Account</h2>
            <p class="subtitle">Join us and access global opportunities</p>
            <form id="signupForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" id="signupFirstName" placeholder="John" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="signupLastName" placeholder="Doe" required></div>
                </div>
                <div class="form-group"><label>Email Address</label><input type="email" id="signupEmail" placeholder="your@email.com" required><span class="error-message" id="signupEmailError"></span></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="signupPhone" placeholder="+254 700 000 000" required></div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Min 8 characters" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()"><i class="fas fa-eye"></i></button>
                    </div>
                    <span class="error-message" id="signupPasswordError"></span>
                </div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required><span class="error-message" id="signupConfirmPasswordError"></span></div>
                <div class="form-group terms">
                    <input type="checkbox" id="signupTerms" required>
                    <label for="signupTerms" style="font-weight:400;cursor:pointer;">I agree to the <a href="terms.html" target="_blank">Terms and Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
                    <span class="error-message" id="signupTermsError"></span>
                </div>
                <button type="submit" class="btn-auth" id="signupBtn">Create Account</button>
            </form>
            <div class="footer-text">Already have an account? <a href="login.html">Sign In</a></div>
        </div>
    </div>

    <!-- ====== SCRIPTS - LOAD IN CORRECT ORDER ====== -->
    <!-- 1. Supabase Library FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. Config -->
    <script src="js/config.js"></script>
    
    <!-- 3. Supabase Config -->
    <script src="js/supabase-config.js"></script>
    
    <!-- 4. Application Logic -->
    <script>
        function togglePassword() {
            const input = document.getElementById('signupPassword');
            const icon = document.querySelector('.toggle-password i');
            if (input.type === 'password') { 
                input.type = 'text'; 
                icon.className = 'fas fa-eye-slash'; 
            } else { 
                input.type = 'password'; 
                icon.className = 'fas fa-eye'; 
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('signupFirstName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('signupPhone').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const terms = document.getElementById('signupTerms').checked;
            
            let hasError = false;
            
            if (password.length < 8) { 
                document.getElementById('signupPasswordError').textContent = 'Password must be at least 8 characters'; 
                hasError = true; 
            }
            if (password !== confirmPassword) { 
                document.getElementById('signupConfirmPasswordError').textContent = 'Passwords do not match'; 
                hasError = true; 
            }
            if (!terms) { 
                document.getElementById('signupTermsError').textContent = 'You must agree to the terms'; 
                hasError = true; 
            }
            if (hasError) return;
            
            try {
                // Check if Auth is available
                if (typeof Auth === 'undefined') {
                    throw new Error('Auth module not loaded. Please refresh the page.');
                }
                
                const { data, error } = await Auth.signUp(email, password, {
                    first_name: firstName, 
                    last_name: lastName, 
                    phone: phone, 
                    full_name: `${firstName} ${lastName}`
                });
                
                if (error) throw error;
                
                alert('✅ Account created successfully! Please check your email to confirm.');
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Signup error:', error);
                document.getElementById('signupEmailError').textContent = 
                    error.message || 'Error creating account. Please try again.';
            }
        });
    </script>
</body>
</html>
